<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Aplikasi Checklist 5S</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

  <h2 class="mb-4">Audit Checklist 5S</h2>

  <!-- FORM -->
  <div class="card mb-4">
    <div class="card-header">Form Audit</div>

    <div class="card-body">
      <form id="form5S">

        <div class="mb-3">
          <label>Nama Auditor</label>
          <input type="text" id="auditor" class="form-control" required>
        </div>

        <!-- Checklist 5S -->
        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="seiri">
          <label class="form-check-label">Seiri (Ringkas)</label>
        </div>

        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="seiton">
          <label class="form-check-label">Seiton (Rapi)</label>
        </div>

        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="seiso">
          <label class="form-check-label">Seiso (Resik)</label>
        </div>

        <div class="form-check">
          <input class="form-check-input" type="checkbox" id="seiketsu">
          <label class="form-check-label">Seiketsu (Rawat)</label>
        </div>

        <div class="form-check mb-3">
          <input class="form-check-input" type="checkbox" id="shitsuke">
          <label class="form-check-label">Shitsuke (Disiplin)</label>
        </div>

        <button type="submit" class="btn btn-primary w-100">
          Simpan Audit
        </button>

      </form>
    </div>
  </div>

  <!-- TABEL -->
  <h3>Riwayat Audit</h3>

  <table class="table table-bordered table-striped">
    <thead class="table-dark">
      <tr>
        <th>Tanggal</th>
        <th>Auditor</th>
        <th>Skor</th>
      </tr>
    </thead>

    <tbody id="tabelBody"></tbody>
  </table>

  <!-- Hubungkan JS -->
  <script src="Mini_Project.js"></script>

</body>
</html>
