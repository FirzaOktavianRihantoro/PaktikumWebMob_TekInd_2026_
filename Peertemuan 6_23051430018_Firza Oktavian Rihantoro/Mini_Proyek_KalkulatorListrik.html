<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Kalkulator Tagihan Listrik</title>

  <!-- Bootstrap -->
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #f4f6f9;
      font-family: Arial, sans-serif;
    }

    .card {
      max-width: 500px;
      margin: 60px auto;
      padding: 20px;
      border-radius: 10px;
      box-shadow: 0 4px 10px rgba(0,0,0,0.1);
    }

    h3 {
      margin-top: 20px;
      font-weight: bold;
    }
  </style>
</head>

<body>

<div class="card">
  <h2 class="text-center mb-4">Kalkulator Tagihan Listrik</h2>

  <!-- Input Daya -->
  <div class="mb-3">
    <label>Daya (Watt)</label>
    <input type="number" id="daya" class="form-control" placeholder="Contoh: 900">
  </div>

  <!-- Input Jam -->
  <div class="mb-3">
    <label>Jam Pemakaian</label>
    <input type="number" id="jam" class="form-control" placeholder="Contoh: 5">
  </div>

  <!-- Output -->
  <h3 id="hasilKwh">Total kWh: 0</h3>
  <h3 id="hasilBiaya">Estimasi Biaya: Rp 0</h3>
</div>

<script>
  const dayaInput = document.getElementById('daya');
  const jamInput = document.getElementById('jam');
  const hasilKwh = document.getElementById('hasilKwh');
  const hasilBiaya = document.getElementById('hasilBiaya');

  function hitungListrik() {
    let daya = parseFloat(dayaInput.value) || 0;
    let jam = parseFloat(jamInput.value) || 0;

    // Rumus kWh
    let kwh = (daya * jam) / 1000;

    // Tarif Rp 1.500 per kWh
    let biaya = kwh * 1500;

    hasilKwh.innerText = "Total kWh: " + kwh.toFixed(2);
    hasilBiaya.innerText = "Estimasi Biaya: Rp " + biaya.toLocaleString();
  }

  // Event realtime (tanpa tombol)
  dayaInput.addEventListener('input', hitungListrik);
  jamInput.addEventListener('input', hitungListrik);
</script>

</body>
</html>
