<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Integrasi API Data Karyawan</title>

    <!-- Bootstrap CSS -->
    <link 
        href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" 
        rel="stylesheet"
    >
</head>

<body class="container mt-5">

    <h2 class="mb-4">Data Karyawan (Dari Server)</h2>

    <div class="mb-3 d-flex align-items-center gap-3">
        <button id="btnLoad" class="btn btn-primary">
            Muat Data dari API
        </button>

        <button id="btnTambah" class="btn btn-success">
            Tambah Karyawan Baru
        </button>

        <button id="btnInsiden" class="btn btn-warning">
            Muat Laporan Insiden
        </button>

        <div id="loading" class="spinner-border text-primary d-none"></div>
    </div>

    <div class="row" id="containerKaryawan"></div>

    <!-- MODAL -->
    <div class="modal fade" id="modalInsiden" tabindex="-1">
        <div class="modal-dialog">
            <div class="modal-content">

                <div class="modal-header">
                    <h5 class="modal-title">Detail Tindak Lanjut</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>

                <div class="modal-body" id="isiModal"></div>

                <div class="modal-footer">
                    <button class="btn btn-secondary" data-bs-dismiss="modal">Tutup</button>
                </div>

            </div>
        </div>
    </div>

    <!-- Script -->
    <script src="api_script.js"></script>

    <!-- WAJIB buat modal -->
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>

</body>
</html>
